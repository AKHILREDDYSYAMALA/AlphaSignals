name: AlphaSignals Daily Scan

on:
  schedule:
    # This runs the script every 3 hours (UTC)
    - cron: "0 */3 * * *"
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/checkout@v3
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python engine.py

      - name: Commit and Push Seen News
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add seen_news.txt
          git commit -m "Update seen news [skip ci]" || echo "No changes to commit"
          git push
